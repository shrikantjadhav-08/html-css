<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Netflix Clone</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

.hero{
    height:100vh;
    width: 100%;
    background-color: black;
    color: white;
    background-image:url(./zjgs096khv591.jpg);
    background-repeat:no-repeat;
    position:relative;
    background-size:cover;
    background-image:url(./Netflix.jpg);
}

.overlay{
    position:absolute;
    inset:0;
    background:rgba(0, 0, 0, 0.274);
}

.logo{
    position:absolute;
    top:15px;
    left:20px;
    color:red;
    font-size:32px;
    font-weight:bold;
}

.signin{
    position:absolute;
    top:15px;
    right:20px;
    background:red;
    color:white;
    border:none;
    padding:8px 15px;
    border-radius:4px;
}

.content{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    color:white;
}

.content h1{
    font-size:42px;
    margin-bottom:10px;
}

.content p{
    margin-bottom:15px;
}

.email{
    padding:10px;
    width:220px;
}
.btn{
    padding:10px 20px;
    background:red;
    color:white;
    border:none;
}
</style>
</head>
<body>
<div class="hero">

    <div class="overlay"></div>
    <div class="logo">NETFLIX</div>
    <button class="signin">Sign In</button>
    <div class="content">
        <h1>Unlimited movies,<br>shows, and more</h1>
        <p>Starts at ₹149. Cancel anytime.</p>

        <input type="email" class="email" placeholder="Email address">
        <button class="btn">Get Started ></button>
    </div>

</div>
</body>
</html>
