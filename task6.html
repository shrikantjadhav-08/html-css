<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipkart Login Task 1 </title>

    <style>

        .parent{
            
            height: 600px;
            width: 1000px;
            border: none ;
            display: flex;
            box-shadow: 5px 5px 10px grey ;
            
        }

        .child1{
            height:520px;
            width: 300px;
            border:none;
            background-color:#2874f0;
            padding: 40px;

             
        }
        .child2{
            height: 520px;
            width: 700px;
            border:  none ;
            padding: 40px;
        }
        input{
            width: 100%;
            border: none;
            border-bottom: 2px solid blue;
            outline: none;
            padding-bottom: 20px ;
        }
        button{
            width: 100%;
            height: 50px;
            background-color: orangered;
            border:none
        } 
        .bottom-text{
           color: blue;
            text-align: center;
            left: 50%;
        }

    <div class="parent">

        <div class="child1">
            <h1><b style="color: white"> Login  </b></h1>
            <h3> <p style="color:white"> Get access to your Orders , <br> Wishlist and Reccomandations </p></h3>
            <br><br><br><br><br>
            <img src="./Screenshot 2026-06-14 151208.png">
        </div>

        <div class="child2">
            
            <input type="text" placeholder="Enter Email/Mobile number"> 
            <br>
            <br>
             <p style="color: gray;"> By Continuing, you agree to Flipkart's <span style="color: blue"> Terms of Use </span> and <span style="color:blue"> Privacy policy </span> </p> 
             <br>
             <button style="color: white"> <b> Request OTP </b>  </button>

            <br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br> 
             <p class="bottom-text"> New To Flipkart? Create an account </p>
        </div>
    </div>
    

</body>
</html>
