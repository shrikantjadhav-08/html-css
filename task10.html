<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emoji Animation</title>
</head>
<style>
    .circle{
        height: 600px;
        width: 600px;
        border: none;
        border-radius: 50%;
        display: flex;
        background-color: #ffff00;
        position: relative;

    }
    .eye1{
        height: 200px;
        width: 150px;
        border: none;
        border-radius: 50%;
        background-color:#ffffff;
        position: absolute;
        top:110px;
        left: 100px;
      
    }
    .eye2{
        height: 200px;
        width: 150px;
        border: none;
        border-radius: 50%;
        position: absolute;
        background-color:#ffffff;
        top: 110px;
        left:350px
    }
    .e1{
        height: 100px;
        width: 50px;
        border: none;
        border-radius: 50%;
        position: absolute;
        background-color: #000000;
        top:60px;
        left:50px;
          /* animation-name: m;
        animation-duration: 0.2s;
        animation-iteration-count: infinite; */
    }
    .e2{
        height: 100px;
        width: 50px;
        border: none;
        border-radius: 50%;
        position: absolute;
        background-color: #000000;
        top:60px;
        left:50px;
             /* animation-name: blink;
        animation-duration: 0.2s;
        animation-iteration-count: infinite; */

    }
    .mouth{
        height: 150px;
        width: 150px;
        border: none;
        border-radius: 50%;
        position: absolute;
        background-color: #fb2828;
        top:370px;
        left:240px;
      
    }
    .mouth:hover{
        
       width: 300px;
       height: 150px;
       background-color: #eb0303; 
       border-radius: 0 0 135px 150px ;
       color: white;
       top:370px;
       left:165px;
    }
    
    .eye1:hover{
        transform: scale(1.5);
    }
    .eye2:hover{
        transform: scale(1.5);
    }
    @keyframes m {
/*    
    0%{ transform: translateX(0); }
    50%{ transform: translateX(20px); }
    100%{ transform: translateX(0); } */

     0%,90%,100%{
        transform: scaleY(1);
    }
    95%{
        transform: scaleY(1.2);
    }
}
/* @keyframes blink{
    0%,90%,100%{
        transform: scaleY(1);
    }
    95%{
        transform: scaleY(0.1);
    }
} */
.eye1,.eye2{
    animation: eyeZoom 1s infinite;
}

@keyframes eyeZoom{
    0%{
        transform: scale(1);
    }

    50%{
        transform: scale(1.3);
    }

    100%{
        transform: scale(1);
    }
}

        

    

        


</style>
<body>

    <div class="circle">
        <div class="eye1">
            <div class="e1"> </div>
        </div>
        <div class="eye2">
            <div class="e2"></div>
        </div>
        <div class="mouth"></div>
    </div>
    
</body>
</html>
