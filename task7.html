<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Border Radius Task3</title>
</head>
<style>


    .parent{
        display: flex;
        gap:50px;
    }

    .parent1{
        display: flex;
        gap: 50px;
    }

    #a{
        height: 200px;
        width: 250px;
        background-color: blue;
        border:1px solid;
        color: white;
        border-radius: 0% 80% 0% 80% ;

    }

    #b{
       width: 200px;
       height: 100px;
       background-color: violet; 
       border-radius: 0 0 100px 100px ;
       color: white;
       text-align: center;
    }

    #c{
        width: 200px;
        height: 100px;
        background-color: orange;
        color: white;
        border-radius: 50%;
        text-align: center;
    }
    
    #d{
        width: 200px;
        height: 200px;
        background-color:darkred;
        color: white;
        border-radius: 50%;
        text-align: center;

    }

    #e{
        width: 200px;
        height: 200px;
        background-color: skyblue;
        color: white;
        border-radius: 0px 0px 100px 100px;
        text-align: center;
    }

    #f{
        width: 200px;
        height: 200px;
        background-color:red;
        color: white;
        border-radius: 0px 100px 100px 100px ;
        text-align: center;
    }

    #g{
        width: 500px;
        height: 200px;
        background-color: orange;
        color: white;
        border-radius: 0px 135px;
        text-align: center;  
    }

    #h{
        width: 500px;
        height: 100px;
        background-color: green;
        color: white;
        border-radius: 0% 100% 0% 100%;
        text-align: center;
    }


</style>
<body>

<div class="parent">

  
    
<div id="a">
    <h2> Leaf </h2>
</div>

<div id="b">
    <h2> Half Oval </h2>
</div>

<div id="c">
    <h2> Oval </h2>
</div>

<div id="d">
    <h2> Circle </h2>
</div>

</div>

<br><br>
<div class="parent1">

<div id="e">
    <h2> Tab </h2>
</div>

<div id="f">
    <h2> Three sided </h2>
</div>

<div id="g">
    <h2> Twist Two </h2>
</div>
</div>
<div id="h">
    <h2> Twist </h2>
</div>


</body>
</html>
